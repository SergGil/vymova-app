<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>English Words Trainer</title>
<script>
  // GitHub Pages serves this file for any unknown path.
  // Store the full URL in sessionStorage and redirect to the app root so
  // React Router can restore the correct route on the client side.
  sessionStorage.setItem('spa-redirect', location.href);
  location.replace('/english-words-app/');
</script>
</head>
</html>
